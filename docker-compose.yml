version: "3.8"

services:
  caddy:
    image: caddy:2.8.4-alpine
    container_name: blog-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-18080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./astro/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ADMIN_IP=${ADMIN_IP}
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin-auth:
    build:
      context: ./admin-auth
    container_name: blog-admin-auth
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      - ADMIN_AUTH_INTERNAL_SECRET=${ADMIN_AUTH_INTERNAL_SECRET}
      - ADMIN_AUTH_HASH_SECRET=${ADMIN_AUTH_HASH_SECRET}
      - ADMIN_AUTH_RP_ID=${ADMIN_AUTH_RP_ID:-hlydwz.com}
      - ADMIN_AUTH_ORIGIN=${ADMIN_AUTH_ORIGIN:-https://hlydwz.com}
      - ADMIN_AUTH_SESSION_TTL_SECONDS=${ADMIN_AUTH_SESSION_TTL_SECONDS:-900}
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.21
    container_name: blog-pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks:ro
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY}
      - TZ=${TZ:-Asia/Shanghai}
      - ADMIN_AUTH_INTERNAL_URL=http://admin-auth:8787
      - ADMIN_AUTH_INTERNAL_SECRET=${ADMIN_AUTH_INTERNAL_SECRET}
      - ADMIN_AUTH_HASH_SECRET=${ADMIN_AUTH_HASH_SECRET}
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
    name: blog_caddy_data
  caddy_config:
    name: blog_caddy_config
  pb_data:
    name: blog_pb_data

networks:
  blog_network:
    name: blog_network
    driver: bridge
