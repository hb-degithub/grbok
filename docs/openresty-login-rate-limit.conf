# OpenResty/Nginx auth endpoint rate limits for the public reverse proxy.
#
# Current Caddy image: caddy:2.8.4-alpine (standard image). It does not ship the
# third-party Caddy rate_limit directive, so keep Caddyfiles free of rate_limit
# and apply auth throttling in OpenResty/1Panel instead.
#
# Put the limit_req_zone lines in http{} scope, then put the location blocks in
# the site server{} before the generic proxy location. The upstream port below
# matches docker-compose.yml: CADDY_HTTP_PORT defaults to 18080.

limit_req_status 429;
limit_req_zone $binary_remote_addr zone=blog_login_password_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=blog_login_admin_ip:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=blog_login_otp_request_ip:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=blog_login_otp_auth_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=blog_user_register_ip:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=blog_email_action_ip:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=blog_comment_create_ip:10m rate=10r/m;

location = /api/collections/users/auth-with-password {
    limit_req zone=blog_login_password_ip burst=5 nodelay;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:18080;
}

location = /api/admins/auth-with-password {
    limit_req zone=blog_login_admin_ip burst=3 nodelay;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
